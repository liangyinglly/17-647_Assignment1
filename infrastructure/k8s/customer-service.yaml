apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: customer-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "<rds-endpoint>"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "<db-user>"
            - name: DB_PASSWORD
              value: "<db-password>"
            - name: DB_NAME
              value: "bookstore"
            - name: DB_AUTO_INIT
              value: "true"
            - name: DB_TRUNCATE_ON_START
              value: "false"
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  type: ClusterIP
  selector:
    app: customer-service
  ports:
    - name: http
      port: 3000
      targetPort: 3000
