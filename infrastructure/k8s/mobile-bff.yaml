apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mobile-bff
  template:
    metadata:
      labels:
        app: mobile-bff
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "false"
        sidecar.opentelemetry.io/inject: "false"
    spec:
      containers:
        - name: mobile-bff
          image: 502612814580.dkr.ecr.us-east-1.amazonaws.com/mobile-bff:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: OTEL_SDK_DISABLED
              value: "true"
            - name: CUSTOMER_SERVICE_URL
              value: "http://customer-service:3000"
            - name: BOOK_SERVICE_URL
              value: "http://book-service:3000"
          livenessProbe:
            httpGet:
              path: /status
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-bff
  namespace: bookstore-ns
spec:
  type: LoadBalancer
  selector:
    app: mobile-bff
  ports:
    - name: http
      port: 80
      targetPort: 80
